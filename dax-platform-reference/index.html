<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAX Platform - Product & Feature Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f7fa;
  --surface: #ffffff;
  --surface-2: #eef1f6;
  --border: #dde2ea;
  --border-2: #c8d0db;
  --text: #111827;
  --muted: #5a6a7e;
  --dim: #8a96a4;
  --blue: #1d6fe8;
  --blue-bg: #deeafd;
  --green: #059669;
  --green-bg: #d1fae5;
  --amber: #d97706;
  --amber-bg: #fef3c7;
  --purple: #7c3aed;
  --purple-bg: #ede9fe;
  --gray-bg: #f0f3f7;
  --pctms: #0891b2;
  --ctms: #2563eb;
  --ops: #ea580c;
  --ai: #7c3aed;
  --r: 8px;
  --rl: 12px;
}
body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

.top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(245, 247, 250, 0.97); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); height: 60px;
  display: flex; align-items: center; padding: 0 28px; gap: 20px;
}
.logo { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; white-space: nowrap; }
.logo em { color: var(--blue); font-style: normal; }
.search-wrap { flex: 1; max-width: 380px; position: relative; }
.search-wrap input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 7px 12px 7px 34px;
  font-size: 13px; color: var(--text); font-family: inherit; outline: none; transition: border 0.15s;
}
.search-wrap input:focus { border-color: var(--blue); }
.search-wrap input::placeholder { color: var(--dim); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--dim); font-size: 13px; pointer-events: none; }
.filters { display: flex; gap: 6px; margin-left: auto; }
.fbtn {
  padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1px solid var(--border); background: transparent; color: var(--muted);
  cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap; letter-spacing: 0.3px;
}
.fbtn:hover { background: var(--surface); color: var(--text); }
.fbtn.active { background: var(--surface-2); color: var(--text); border-color: var(--active-c, var(--blue)); color: var(--active-c, var(--blue)); }

.main { padding: 80px 28px 60px; max-width: 1360px; margin: 0 auto; }

.hero { padding: 32px 0 28px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
.hero h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
.hero h1 span { color: var(--blue); }
.hero p { color: var(--muted); font-size: 14px; max-width: 620px; }

.stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 36px; }
.scard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 14px; text-align: center; position: relative; overflow: hidden; }
.scard-btn { cursor: pointer; transition: all 0.15s; }
.scard-btn:hover { border-color: var(--border-2); transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,0.06); }
.scard-active { border-color: var(--border-2); box-shadow: 0 0 0 2px rgba(29,111,232,0.08); background: var(--surface-2); }
.scard-indicator { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; opacity: 0; transition: opacity 0.15s; }
.scard-btn:hover .scard-indicator { opacity: 0.4; }
.scard-active .scard-indicator { opacity: 1; }
.snum { font-size: 26px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.slabel { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }

.sec-head { display: flex; align-items: center; gap: 10px; margin: 32px 0 14px; }
.sec-pip { width: 4px; height: 20px; border-radius: 2px; flex-shrink: 0; }
.sec-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; }
.sec-cnt { font-size: 11px; color: var(--dim); border: 1px solid var(--border); border-radius: 8px; padding: 2px 8px; margin-left: 4px; }
.sec-sub { font-size: 12px; color: var(--dim); margin-left: auto; font-style: italic; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; align-items: stretch; }

.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl);
  padding: 20px; cursor: pointer; position: relative;
  display: flex; flex-direction: column; min-height: 100%;
  overflow: hidden; transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s ease, border-color 0.18s ease, background 0.18s ease;
}
/* Top accent bar */
.card::before {
  content: ''; position: absolute; left: 0; top: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--cc), transparent 80%);
  border-radius: 12px 12px 0 0; opacity: 0.7; transition: opacity 0.2s;
}
/* Left accent line */
.card::after {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--cc); border-radius: 12px 0 0 12px; opacity: 0.6; transition: opacity 0.2s;
}
/* Glow on hover */
.card:hover {
  border-color: var(--cc);
  background: var(--surface-2);
  transform: translateY(-4px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 0 0 1px var(--cc), 0 16px 40px color-mix(in srgb, var(--cc) 12%, transparent);
}
.card:hover::before { opacity: 1; }
.card:hover::after { opacity: 1; }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
.cat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--cc); }

/* Status badges - redesigned */
.badge {
  font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px;
  letter-spacing: 0.4px; display: inline-flex; align-items: center; gap: 5px;
}
.badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.b-live { background: rgba(52,211,153,0.12); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }
.b-live::before { background: #34d399; box-shadow: 0 0 6px #34d399; }
.b-enhancing { background: rgba(251,191,36,0.1); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
.b-enhancing::before { background: #fbbf24; box-shadow: 0 0 6px #fbbf24; }
.b-building { background: rgba(59,158,255,0.1); color: #3b9eff; border: 1px solid rgba(59,158,255,0.3); }
.b-building::before { background: #3b9eff; box-shadow: 0 0 6px #3b9eff; }
.b-planned { background: rgba(74,90,110,0.15); color: #7a8fa6; border: 1px solid rgba(74,90,110,0.3); }
.b-planned::before { background: #4a5a6e; }

.card-name { font-size: 16px; font-weight: 700; margin-bottom: 5px; line-height: 1.25; transition: color 0.15s; }
.card:hover .card-name { color: #fff; }
.card-sub { font-size: 11px; color: var(--dim); margin-bottom: 10px; }
.card-desc { font-size: 12px; color: var(--muted); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.card-foot { margin-top: auto; padding-top: 16px; display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; }

/* Tags - redesigned with pillar-aware color */
.card-tags { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; }
.ctag {
  font-size: 10px; font-weight: 600; padding: 3px 8px;
  background: color-mix(in srgb, var(--cc) 8%, transparent);
  border: 1px solid color-mix(in srgb, var(--cc) 22%, transparent);
  border-radius: 20px; color: color-mix(in srgb, var(--cc) 80%, #111827);
  letter-spacing: 0.2px; transition: all 0.15s;
}
.card:hover .ctag {
  background: color-mix(in srgb, var(--cc) 14%, transparent);
  border-color: color-mix(in srgb, var(--cc) 40%, transparent);
}

.card-arrow {
  width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--dim); border: 1px solid var(--border);
  transition: all 0.2s; flex-shrink: 0;
}
.card:hover .card-arrow {
  color: var(--cc); border-color: var(--cc);
  background: color-mix(in srgb, var(--cc) 10%, transparent);
  transform: rotate(45deg);
}

.no-results { display: none; text-align: center; padding: 60px 20px; color: var(--dim); font-size: 14px; }

.detail-layer {
  position: fixed; inset: 0; background: var(--bg); z-index: 200;
  overflow-y: auto; display: none;
}
.detail-layer.open { display: block; }
.det-nav {
  position: sticky; top: 0; background: rgba(245,247,250,0.97); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); padding: 14px 28px;
  display: flex; align-items: center; gap: 16px; z-index: 10;
}
.back-btn {
  display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted);
  cursor: pointer; background: none; border: none; font-family: inherit; padding: 4px 0;
  transition: color 0.15s;
}
.back-btn:hover { color: var(--text); }
.crumb { font-size: 12px; color: var(--dim); }
.crumb strong { color: var(--text); font-weight: 600; }

.det-body { max-width: 820px; margin: 0 auto; padding: 44px 28px 100px; }
.det-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.det-cat { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.det-title { font-size: 34px; font-weight: 800; letter-spacing: -0.6px; line-height: 1.15; margin-bottom: 8px; }
.det-subtitle { font-size: 15px; color: var(--muted); margin-bottom: 28px; }
.det-chips { display: flex; gap: 10px; margin-bottom: 40px; flex-wrap: wrap; }
.chip {
  display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted);
  background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px;
}
.chip-dot { width: 6px; height: 6px; border-radius: 50%; }

.section { margin-bottom: 36px; }
.sec-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--dim); margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.sec-body { font-size: 14px; color: var(--muted); line-height: 1.8; }
.sec-body strong { color: var(--text); font-weight: 600; }
.sec-body p { margin-bottom: 10px; }
.sec-body ul { padding-left: 18px; margin-top: 8px; }
.sec-body li { margin-bottom: 6px; }

.complexity-row { display: flex; align-items: center; gap: 8px; }
.cx-bar { display: flex; gap: 3px; }
.cx-pip { width: 18px; height: 5px; border-radius: 3px; }
.cx-label { font-size: 12px; color: var(--dim); }

.det-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border); }
.dtag { font-size: 12px; padding: 4px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; color: var(--muted); }

.note-box { background: var(--surface-2); border: 1px solid var(--border-2); border-radius: var(--r); padding: 14px 16px; margin-bottom: 36px; }
.note-box p { font-size: 13px; color: var(--muted); font-style: italic; }
</style>
</head>
<body>

<header class="top-bar">
  <div class="logo">DAX <em>Platform</em></div>
  <div class="search-wrap">
    <span class="search-icon">&#9906;</span>
    <input id="srch" type="text" placeholder="Search products, features, modules..." oninput="doFilter()">
  </div>
  <div class="filters">
    <button class="fbtn active" style="--active-c:#111827" onclick="setCat('all',this)">All</button>
    <button class="fbtn" style="--active-c:#0891b2" onclick="setCat('pctms',this)">PCTMS</button>
    <button class="fbtn" style="--active-c:#2563eb" onclick="setCat('ctms',this)">CTMS</button>
    <button class="fbtn" style="--active-c:#ea580c" onclick="setCat('ops',this)">Operations</button>
    <button class="fbtn" style="--active-c:#7c3aed" onclick="setCat('ai',this)">AI Features</button>
  </div>
</header>

<main class="main" id="list-view">
  <div class="hero">
    <h1>DAX Platform <span>Product Intelligence</span></h1>
    <p>Complete reference for every product, module, and AI feature being built. Click any item for a full breakdown of what it is, current state, and what needs to be built.</p>
  </div>
  <div class="stats-grid" id="stats-grid"></div>
  <div id="content"></div>
  <div class="no-results" id="no-res">No items match your search.</div>
</main>

<div class="detail-layer" id="det-layer">
  <div class="det-nav">
    <button class="back-btn" onclick="closeDetail()">&#8592;&nbsp; Back to all products</button>
    <div class="crumb" id="det-crumb"></div>
  </div>
  <div class="det-body" id="det-body"></div>
</div>

<script>
const CATS = {
  pctms: { label: 'Pre-Clinical Trial Management', short: 'PCTMS', color: '#0891b2' },
  ctms:  { label: 'Clinical Trial Management / Site Ops', short: 'CTMS / SOMS', color: '#2563eb' },
  ops:   { label: 'Operational Modules', short: 'Operations', color: '#ea580c' },
  ai:    { label: 'AI-Enabled Features', short: 'AI Features', color: '#7c3aed' }
};

const SL = { live:'Live', enhancing:'Enhancing', building:'Building', planned:'Planned' };
const CX_LABELS = ['','Very Low','Low','Medium','High','Very High'];

const ITEMS = [
  {
    id:'syncora-core', cat:'pctms', status:'live', cx:4,
    name:'Syncora Core', sub:'Pre-Clinical Trial Management System',
    delivery:'Standalone web application',
    short:'The flagship pre-clinical trial management system for research sites. Manages all activities before a trial formally activates: startup workflows, feasibility, and early site administration.',
    what:'Syncora is a purpose-built PCTMS (Pre-Clinical Trial Management System) for clinical research sites. It covers everything before a trial is officially activated: feasibility evaluations, regulatory startup task tracking, site qualification visits, and early study administration. Most CTMS products on the market focus only on post-activation. Syncora fills this gap and positions DAX in the study lifecycle before any competitor is even present.',
    now:'Live and deployed across multiple Revival Research sites. Core study management, site workflow tools, and a basic CRM are operational. Used daily by site teams managing pre-activation pipelines.',
    build:'Primary enhancement: CRM module (see Syncora CRM). Secondary priorities include a scalability overhaul for multi-site portfolio management, sponsor and CRO read-only access portals, study startup timeline automation with milestone tracking, and a REST API layer so Syncora data can feed into the future CTMS Core and AI modules.',
    tech:'Needs modular architecture refactoring so individual features (CRM, feasibility tools, reporting) can be upgraded independently without touching core logic. Multi-tenancy design for managing multiple sites under one organization. RESTful API layer is essential for downstream integration with every other DAX module.',
    comp:'Most CTMS vendors (Medidata, Veeva, RealTime eClinical) focus entirely on post-activation. Very few tools exist specifically for the pre-activation phase. Syncora competes in an underserved segment with no dominant incumbent.',
    tags:['PCTMS','study startup','feasibility','site management','multi-site','pre-activation']
  },
  {
    id:'syncora-crm', cat:'pctms', status:'enhancing', cx:3,
    name:'Syncora CRM', sub:'Sponsor and CRO Relationship Management',
    delivery:'Module within Syncora',
    short:'A clinical-research-specific CRM embedded in Syncora. Manages sponsor and CRO relationships, study opportunity pipelines, outreach sequences, and contract progression.',
    what:'A purpose-built CRM for clinical research sites managing their business development pipeline. Unlike general CRMs designed for sales teams, this is tailored to the sponsor/CRO relationship lifecycle: first contact and feasibility discussions, protocol negotiations, budget reviews, and contract execution. Every study opportunity is tracked from initial lead through site activation.',
    now:'Basic contact and study tracking exists in Syncora. Missing: structured pipeline views, configurable deal stages, automated follow-up logic, email integration, communication logs tied to specific studies, and BD performance reporting.',
    build:'Full pipeline management with Kanban board view and configurable deal stages. Sponsor and CRO profile pages with complete interaction history. Gmail and Outlook integration for email tracking. Automated follow-up reminders. BD performance dashboards showing win rate, conversion time, and revenue pipeline by therapeutic area. Document management for proposals, NDAs, and contracts.',
    tech:'Contact and account data model with study opportunity as the core entity. Gmail and Outlook OAuth integration for tracking email threads. Kanban pipeline with drag-and-drop stage movement. Integration with BD Director workflows. Notification system for follow-up reminders.',
    comp:'Sites currently use Salesforce, HubSpot, or spreadsheets for BD CRM. None are built for the sponsor/CRO relationship model or the clinical trial study opportunity lifecycle. A CRM built specifically for site business development would be immediately adoptable across any independent site network.',
    tags:['CRM','pipeline','BD','sponsor management','outreach','business development','Kanban']
  },
  {
    id:'ctms-core', cat:'ctms', status:'building', cx:5,
    name:'CTMS Core', sub:'Site Operations Management System',
    delivery:'Standalone web application (platform foundation)',
    short:'The central hub of the entire DAX platform. A full clinical trial management system built for research sites managing active trials, covering enrollment, scheduling, protocol compliance, and study closeout.',
    what:'A Clinical Trial Management System built from the site perspective, not the sponsor perspective. Manages every active trial from activation through closeout. Coordinators use it daily to track patient enrollment, schedule visits, document protocol deviations, and maintain site compliance. It is the operational brain of the clinical site and the foundation into which every other DAX module connects.',
    now:'Does not exist yet. Currently being scoped and architected. This is the highest-priority new product because it becomes the foundation all other modules plug into. Building CTMS Core first is the prerequisite for every other CTMS-category item on this list.',
    build:'Study dashboard with portfolio-level overview across all active studies. Protocol library with version control and amendment tracking. Patient enrollment tracker with funnel visualization (screened, consented, enrolled, completed, dropped). Visit calendar and scheduling engine. Protocol deviation management with CAPA (Corrective and Preventive Action) workflows. Query management for site-initiated and sponsor-initiated queries. Staff delegation and training record tracking integrated with the Training Portal. Monitoring visit management and preparation tools. Study closeout workflow with documentation checklist.',
    tech:'Multi-site, multi-tenant architecture from day one. Role-based access control with distinct permission levels for coordinators, investigators, site directors, monitors, and sponsors. 21 CFR Part 11 compliant audit trail for every data change. RESTful API for all major modules so eSource, eICF, payment systems, and AI features can connect. Real-time sync for concurrent multi-user editing.',
    comp:'RealTime eClinical, Oncore (Advarra), CTMS Hub are the incumbents. Most are legacy systems with poor user experience, expensive licensing, and no AI roadmap. RealTime has been acknowledged as being too embedded in legacy code to innovate rapidly. DAX enters with a modern architecture, no legacy debt, and an AI layer from day one.',
    tags:['CTMS','enrollment','protocol','compliance','site operations','21CFR','visit scheduling','multi-tenant']
  },
  {
    id:'esource', cat:'ctms', status:'planned', cx:5,
    name:'eSource', sub:'Electronic Source Data Capture',
    delivery:'Module within CTMS + standalone',
    short:'Replaces paper source documents at the clinical site. Clinical staff enter patient visit data directly into structured electronic forms that serve as the legal source record before submission to the sponsor EDC.',
    what:'eSource is the digital replacement for paper source documents at a clinical trial site. Every patient visit generates source data: vitals, assessments, lab results, adverse events, concomitant medications. eSource captures all of this in structured electronic forms with a full audit trail. It is the legal origin point of all trial data before that data is submitted to the sponsor\'s EDC (Electronic Data Capture) system. Well-implemented eSource eliminates transcription errors, accelerates data cleaning, and reduces the cost of monitoring visits.',
    now:'Does not exist. Paper source remains the standard at most sites. One of the most technically complex and commercially valuable modules to build.',
    build:'Visit-by-visit structured data entry with protocol-driven form templates. Required field enforcement with range checks and format validation. Multi-user concurrent editing with conflict resolution. Investigator and coordinator e-signatures per ICH E6(R2). Auto-save and offline capability for sites with connectivity issues. Integration with lab data feeds to auto-populate lab result fields. Integration with patient payment triggers (visit completion automatically initiates stipend payment). API connections to major sponsor EDC systems for data export. Full audit trail showing who entered, edited, reviewed, and signed each data point.',
    tech:'Core challenge: flexibility. Every protocol is different, every sponsor has different data requirements. Forms must be configurable per protocol while maintaining structural integrity for FDA inspection. 21 CFR Part 11 e-signature with immutable audit log. Data versioning so all historical versions of every entry are preserved. HL7 FHIR for lab data imports. EDC API connectors (Medidata, Veeva, REDCap) for structured data export.',
    comp:'CRIO (Clinical Research IO), RealTime eBinder, Castor EDC are the main eSource tools. All are closed, proprietary systems. The strategic opportunity: build an open eSource that any site can use, and combine it with the eSource Builder (see AI Features section) so templates can be created and exported to other systems, turning DAX into a platform for the broader eSource ecosystem.',
    tags:['eSource','source data','data capture','21CFR','e-signature','forms','audit trail','EDC integration']
  },
  {
    id:'eisf', cat:'ctms', status:'planned', cx:4,
    name:'eISF / Regulatory Binder', sub:'Electronic Investigator Site File',
    delivery:'Module within CTMS',
    short:'Digital filing system for all regulatory documents required at the clinical site level. Covers IRB approvals, protocol versions, staff CVs, lab certifications, delegation logs, and all GCP-required documentation per ICH E6(R2).',
    what:'The Electronic Investigator Site File (eISF), also known as the site-level eTMF, is the organized repository of all regulatory documents required by ICH E6(R2) GCP guidelines for every active clinical trial. This includes protocol versions and amendments, IRB/EC approvals, investigator curricula vitae, financial disclosures, laboratory accreditation certificates, staff delegation logs, monitoring visit logs, and all sponsor correspondence. During an FDA inspection, the ISF must be produced immediately and completely. A disorganized or incomplete ISF is one of the most common causes of FDA warning letters.',
    now:'Does not exist as a system. Sites maintain ISFs in shared drives, physical binders, or expensive dedicated tools from vendors like Florence.',
    build:'Document repository with folder structure mirroring ICH E6(R2) ISF requirements. Version control for protocol amendments and regulatory document updates. Expiration date tracking with automated alerts at 90, 30, and 7 days (CVs expire every 2 years, lab certs annually, IRB approvals annually). Electronic signature routing for delegation logs and documents requiring co-signatures. Sponsor and CRO read-only access portal for remote monitoring. FDA inspection export package generator that produces a complete, organized archive.',
    tech:'Document management system with GCP-mandated folder taxonomy as the default structure. Metadata tagging: document type, study association, version, effective date, expiration date, owner. E-signature workflow engine with 21 CFR Part 11 compliance. OCR for searching within scanned documents. Bulk upload capability for initial site setup migration from paper or shared drives.',
    comp:'Florence eBinders is the dominant product for sites. Trial Interactive and Veeva Vault eTMF are sponsor-focused tools. Florence has wide adoption but poor UX and high per-site pricing. An integrated, affordable eISF built natively into DAX eliminates the need for a separate Florence subscription for every study, representing immediate cost savings for the site.',
    tags:['eISF','eTMF','regulatory','GCP','ICH E6R2','compliance','IRB','Florence alternative','documents']
  },
  {
    id:'patient-payment', cat:'ctms', status:'planned', cx:4,
    name:'Patient Payment System', sub:'Participant Compensation Management',
    delivery:'Module within CTMS',
    short:'Manages clinical trial participant compensation. Handles protocol-specific stipend schedules, visit completion triggers, electronic payment disbursement, and annual tax documentation for participants.',
    what:'Clinical trial participants are compensated for their time and inconvenience. Managing this compensation is administratively complex: each protocol has a different payment schedule, different visit types trigger different amounts, and sites must track owed versus paid for every participant in every active study simultaneously. The Patient Payment System connects visit completion data from the CTMS directly to payment disbursement through electronic payment rails, eliminating spreadsheet tracking and reducing both errors and administrative burden.',
    now:'Does not exist. Sites track payments in spreadsheets and issue paper checks manually. This is one of the most labor-intensive administrative tasks at a busy research site.',
    build:'Payment rules engine that stores protocol-specific amounts per visit type (screening visit, treatment visit, end-of-study visit) and procedure type. Automatic payment triggers when coordinators confirm visit completion in the CTMS. Participant identity verification and payment method enrollment. Multiple payment options: ACH bank transfer, prepaid debit card (Visa/Mastercard), or check. Real-time payment status tracking per participant per study. Monthly and annual reconciliation reporting. 1099 form generation for US participants who receive over $600 in a calendar year.',

let activeCat = 'all';
let activeStatus = 'all';

function setCat(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setStatus(status) {
  activeStatus = activeStatus === status ? 'all' : status;
  renderStats();
  render();
}

function doFilter() { render(); }

function filtered() {
  const q = document.getElementById('srch').value.toLowerCase();
  return ITEMS.filter(item => {
    const catOk = activeCat === 'all' || item.cat === activeCat;
    const txt = (item.name + ' ' + item.short + ' ' + item.tags.join(' ')).toLowerCase();
    const qOk = !q || txt.includes(q);
    let statusOk = true;
    if (activeStatus === 'live') statusOk = item.status === 'live';
    else if (activeStatus === 'building') statusOk = item.status === 'building' || item.status === 'enhancing';
    else if (activeStatus === 'planned') statusOk = item.status === 'planned';
    return catOk && qOk && statusOk;
  });
}

function renderStats() {
  const t = ITEMS.length;
  const live = ITEMS.filter(i => i.status==='live').length;
  const bld = ITEMS.filter(i => i.status==='building'||i.status==='enhancing').length;
  const pln = ITEMS.filter(i => i.status==='planned').length;
  const aS = activeStatus;
  document.getElementById('stats-grid').innerHTML = `
    <div class="scard scard-btn ${aS==='all'?'scard-active':''}" onclick="setStatus('all')" title="Show all">
      <div class="snum" style="color:#e8eef5">${t}</div><div class="slabel">Total Products</div>
      <div class="scard-indicator" style="background:#e8eef5"></div>
    </div>
    <div class="scard scard-btn ${aS==='live'?'scard-active':''}" onclick="setStatus('live')" title="Filter: Live Today">
      <div class="snum" style="color:#34d399">${live}</div><div class="slabel">Live Today</div>
      <div class="scard-indicator" style="background:#34d399"></div>
    </div>
    <div class="scard scard-btn ${aS==='building'?'scard-active':''}" onclick="setStatus('building')" title="Filter: In Development">
      <div class="snum" style="color:#3b9eff">${bld}</div><div class="slabel">In Development</div>
      <div class="scard-indicator" style="background:#3b9eff"></div>
    </div>
    <div class="scard scard-btn ${aS==='planned'?'scard-active':''}" onclick="setStatus('planned')" title="Filter: On Roadmap">
      <div class="snum" style="color:#7a8fa6">${pln}</div><div class="slabel">On Roadmap</div>
      <div class="scard-indicator" style="background:#7a8fa6"></div>
    </div>
    <div class="scard">
      <div class="snum" style="color:#f97316">4</div><div class="slabel">Platform Pillars</div>
    </div>
  `;
}

function render() {
  const items = filtered();
  const nr = document.getElementById('no-res');
  const c = document.getElementById('content');
  if (items.length === 0) { nr.style.display='block'; c.innerHTML=''; return; }
  nr.style.display = 'none';
  const order = ['pctms','ctms','ops','ai'];
  let html = '';
  order.forEach(cat => {
    const ci = items.filter(i => i.cat===cat);
    if (!ci.length) return;
    const info = CATS[cat];
    html += `<div class="sec-head">
      <div class="sec-pip" style="background:${info.color}"></div>
      <div class="sec-label" style="color:${info.color}">${info.label}</div>
      <div class="sec-cnt">${ci.length}</div>
    </div><div class="grid">`;
    ci.forEach(item => {
      const tags = item.tags.slice(0,3).map(t=>`<span class="ctag">${t}</span>`).join('');
      html += `<div class="card" style="--cc:${info.color}" onclick="openDetail('${item.id}')">
        <div class="card-top">
          <div class="cat-label">${info.short}</div>
          <span class="badge b-${item.status}">${SL[item.status]}</span>
        </div>
        <div class="card-name">${item.name}</div>
        <div class="card-sub">${item.sub}</div>
        <div class="card-desc">${item.short}</div>
        <div class="card-foot">
          <div class="card-tags">${tags}</div>
          <div class="card-arrow">&#8599;</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  c.innerHTML = html;
}

    <div class="section">
      <div class="sec-title">What needs to be built</div>
      <div class="sec-body"><p>${item.build}</p></div>
    </div>
    <div class="section">
      <div class="sec-title">Technical considerations</div>
      <div class="sec-body"><p>${item.tech}</p></div>
    </div>
    <div class="section">
      <div class="sec-title">Competitive landscape</div>
      <div class="sec-body"><p>${item.comp}</p></div>
    </div>
    <div class="det-tags">${tags}</div>
  `;

  const layer = document.getElementById('det-layer');
  layer.classList.add('open');
  layer.scrollTop = 0;
}

function closeDetail() {
  document.getElementById('det-layer').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key==='Escape') closeDetail(); });

renderStats();
render();
</script>
</body>
</html>
